theme: jekyll-theme-cayman
title: Jayden News
description: Jayden 的 AI 日报 · 每天精选科技与 AI 动态
baseurl: ""
url: "https://news.jayden0.com"

# Build settings
markdown: kramdown
future: true
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
